services:
  - type: web
    name: ziele-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run build
    preDeployCommand: npm run db:deploy
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: CORS_ORIGIN
        value: https://ziele-theta.vercel.app
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_WEBHOOK_SIGNING_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: REDIS_RATE_LIMIT_PREFIX
        value: ziele:ratelimit
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_FALLBACK_MODELS
        value: gemini-2.0-flash,gemini-2.0-flash-lite,gemini-1.5-flash
      - key: LIBRETRANSLATE_API_URL
        value: https://libretranslate.com
      - key: LIBRETRANSLATE_API_KEY
        sync: false
      - key: CRON_SHARED_SECRET
        sync: false
